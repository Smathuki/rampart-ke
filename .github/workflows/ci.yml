name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json

      - name: Build
        run: npm run build

      - name: Test (offline suite)
        run: npm test
        # The full-model end-to-end test is gated behind RAMPART_KE_E2E and is
        # intentionally NOT run in CI (it downloads the ~15 MB ONNX weights).
